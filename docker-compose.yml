version: '3.9'

services:
  db:
    image: postgres:16
    container_name: detectlab-postgres
    environment:
      POSTGRES_USER: detect
      POSTGRES_PASSWORD: detect
      POSTGRES_DB: detectlab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: detectlab-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata: