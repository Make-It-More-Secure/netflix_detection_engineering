{% extends "base.html" %}
{% block content %}
<h2>Alerts{% if rule_id %} for {{ rule_id }}{% endif %}</h2>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Rule</th>
      <th>Severity</th>
      <th>Risk</th>
      <th>Created</th>
    </tr>
  </thead>
  <tbody>
  {% for a in alerts %}
    <tr>
      <td><a href="/alerts/{{ a.id }}">{{ a.id }}</a></td>
      <td>{{ a.rule_id }} – {{ a.rule_name }}</td>
      <td>{{ a.severity }}</td>
      <td>{{ a.risk_score }}</td>
      <td>{{ a.created_at }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
