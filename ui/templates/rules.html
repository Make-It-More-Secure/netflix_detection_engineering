{% extends "base.html" %}
{% block content %}
<h2>Detection Rules</h2>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Severity</th>
      <th>Risk</th>
      <th>Datasource</th>
      <th>Tags</th>
    </tr>
  </thead>
  <tbody>
  {% for r in rules %}
    <tr>
      <td>{{ r.id }}</td>
      <td>{{ r.name }}</td>
      <td>{{ r.severity }}</td>
      <td>{{ r.risk_score }}</td>
      <td>{{ r.datasource }}</td>
      <td>{{ ", ".join(r.tags) }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
